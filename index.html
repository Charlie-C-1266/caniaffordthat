<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Resolves and applies the light/dark theme before first paint, so the
      page never flashes the wrong theme. Kept in sync by hand with
      THEME_STORAGE_KEY and resolveInitialTheme in src/lib/theme.ts — this
      runs before any bundled JS exists, so it can't import that module.
      Duplicated identically in sources/index.html and
      methodology/vehicle/index.html.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light')
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
