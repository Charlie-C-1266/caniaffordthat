<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@700&family=Manrope:wght@600;800&display=swap"
  rel="stylesheet"
/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #1b1830;
    font-family: 'Manrope', sans-serif;
    color: #f5f3ff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 90px 100px;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,92,252,0.35) 0%, rgba(124,92,252,0) 70%);
    top: -250px;
    right: -200px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }
  .brand .square {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: #7c5cfc;
  }
  .brand .name {
    font-size: 20px;
    font-weight: 700;
  }
  h1 {
    font-size: 76px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 28px;
    max-width: 900px;
  }
  p {
    font-size: 28px;
    font-weight: 600;
    color: rgba(245, 243, 255, 0.7);
    max-width: 780px;
    line-height: 1.5;
  }
  .verdict {
    position: absolute;
    bottom: 90px;
    right: 100px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: #14121f;
    border-radius: 16px;
    padding: 14px 22px;
  }
  .verdict .dot {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #2ed573;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: #14121f;
    font-family: 'IBM Plex Mono', monospace;
  }
  .verdict .label {
    font-size: 20px;
    font-weight: 800;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="brand">
    <div class="square"></div>
    <div class="name">Can I Afford That?</div>
  </div>
  <h1>Work out whether it's<br />within reach.</h1>
  <p>Answer a few quick questions and get a straight yes-or-no verdict, backed by the real numbers.</p>
  <div class="verdict">
    <div class="dot">✓</div>
    <div class="label">Yes — it's within reach.</div>
  </div>
</body>
</html>
